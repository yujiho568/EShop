<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link href="/main.css" rel="stylesheet">
</head>
<body>
  <div th:replace="~{nav.html::navbar}"></div>
  <a href="/my-page">mypage</a>
  <div sec:authorize="isAuthenticated()">
    <a href="/logout">logout</a>
  </div>

  <form action="/search" method="GET">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <input name="searchText" style="display:inline">
    <button type="submit">search</button>
  </form>
  <div class="card" th:each="p:${products}">
    <img th:src="${p.image}">
    <div>
      <h4 th:text="${p.title}"></h4>
      <a th:href="@{'/detail/' + ${p.id}}">link</a>
      <p th:text="${p.price}">price</p>
      <a th:href="@{'/edit/' + ${p.id}}">edit</a>
      <span th:onclick="fetch(`/product?id=[[${p.id}]]`, {method : 'DELETE'})">delete</span>
    </div>
  </div>
  <div class="pagination">
    <a th:if="${currentPage > 1}"
       th:href="${searchText != null} ? @{'/search?searchText=' + ${searchText} + '&page=' + ${currentPage - 1}} : @{'/list/page/' + ${currentPage - 1}}">Previous</a>

    <span th:each="pageNum : ${#numbers.sequence(1, totalPages)}">
        <a th:href="${searchText != null} ? @{'/search?searchText=' + ${searchText} + '&page=' + ${pageNum}} : @{'/list/page/' + ${pageNum}}"
           th:text="${pageNum}"
           th:classappend="${pageNum == currentPage} ? 'current-page' : ''">page</a>
    </span>

    <a th:if="${currentPage < totalPages}"
       th:href="${searchText != null} ? @{'/search?searchText=' + ${searchText} + '&page=' + ${currentPage + 1}} : @{'/list/page/' + ${currentPage + 1}}">Next</a>
  </div>
</body>
</html>
